name: schach_app
description: "Offline-first chess learning app for children."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  go_router: ^17.1.0
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1
  dartchess: ^0.12.1
  flutter_chess_board: ^1.0.1
  uuid: ^4.5.3
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  collection: ^1.19.1
  stockfish: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  drift_dev: ^2.29.0
  json_serializable: ^6.11.2
  freezed: ^3.2.3
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/manifest.json
    - assets/content/lessons/
    - assets/content/lessons/pieces/
    - assets/content/puzzles/
    - assets/content/puzzles/tactics/
